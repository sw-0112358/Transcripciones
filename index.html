<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icono.jpg" type="image/jpeg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="sw">
    <link rel="apple-touch-icon" href="icono.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Transcripciones</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
      :root {
        --bg:        #f5f5f5;
        --surface:   #ffffff;
        --surface-2: #f9f9f9;
        --border:    #e0e0e0;
        --border-2:  #ebebeb;
        --text:      #1a1a1a;
        --text-sub:  #666666;
        --text-hint: #999999;
        --accent:    #2d2d2d;
        --accent-2:  #555555;
        --radius:    10px;
        --radius-sm: 6px;
        --shadow:    0 1px 4px rgba(0,0,0,0.07);
        --shadow-md: 0 2px 12px rgba(0,0,0,0.09);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: Arial, sans-serif;
        background: var(--bg);
        min-height: 100vh;
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .pantalla {
        display: none;
        width: 100%;
        max-width: 660px;
        padding: 28px 16px 90px;
        animation: fadeUp .22s ease;
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: none; }
      }

      .screen-header {
        text-align: center;
        margin-bottom: 18px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--border);
      }
      .screen-header h4 {
        font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: .3px;
      }
      .screen-header h6 {
        font-size: 12px; font-weight: 400; color: var(--text-hint); margin-top: 3px;
      }

      .card {
        background: var(--surface); border: 1px solid var(--border);
        border-radius: var(--radius); box-shadow: var(--shadow);
        padding: 14px; margin-bottom: 12px;
      }

      .listview {
        width: 100%; height: 30vh; border: 1px solid var(--border);
        border-radius: var(--radius-sm); background: var(--surface-2);
        margin-bottom: 10px; overflow-y: auto; display: flex; flex-direction: column;
      }
      .listview::-webkit-scrollbar { width: 4px; }
      .listview::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
      .listview .item {
        padding: 8px 12px; border-bottom: 1px solid var(--border-2);
        font-size: 11.5px; color: var(--text-sub); text-align: left;
        cursor: pointer; word-break: break-all; transition: background .12s;
      }
      .listview .item:last-child { border-bottom: none; }
      .listview .item:hover { background: #f0f0f0; }
      .listview .item.selected { background: #ebebeb; color: var(--text); }

      .controls-row {
        display: flex; flex-wrap: wrap; gap: 7px;
        align-items: center; justify-content: center; margin-bottom: 9px;
      }

      input[type="number"], input[type="text"] {
        font-family: 'Inter', sans-serif; font-size: 12.5px; padding: 6px 10px;
        border: 1px solid var(--border); border-radius: var(--radius-sm);
        background: var(--surface); color: var(--text); text-align: center;
        outline: none; transition: border-color .15s, box-shadow .15s;
      }
      input[type="number"] { width: 56px; }
      input[type="text"]   { min-width: 210px; }
      input:focus { border-color: #aaa; box-shadow: 0 0 0 2px rgba(0,0,0,0.06); }

      select {
        font-family: 'Inter', sans-serif; font-size: 12.5px; padding: 6px 12px;
        border: 1px solid var(--border); border-radius: var(--radius-sm);
        background: var(--surface); color: var(--text); cursor: pointer;
        outline: none; min-width: 160px; transition: border-color .15s;
      }
      select:focus { border-color: #aaa; }

      label {
        font-family: 'Inter', sans-serif; font-size: 12px; padding: 6px 10px;
        border: 1px solid var(--border); border-radius: var(--radius-sm);
        background: var(--surface-2); color: var(--text-hint);
      }

      #status {
        width: 100%; padding: 9px 12px; border-radius: var(--radius-sm);
        background: var(--surface-2); border: 1px solid var(--border-2);
        font-size: 11.5px; color: var(--text-sub); margin-top: 6px; min-height: 34px;
      }

      .collapsible {
        position: fixed; top: 90%; right: 10px; background-color: transparent;
        color: white; cursor: pointer; padding: 12px; border: none;
        border-radius: 5px; font-size: 16px; z-index: 9999;
      }
      .active, .collapsible:hover { background-color: transparent; }

      button {
        font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 500;
        background: var(--surface); color: var(--text); border: 1px solid var(--border);
        padding: 7px 13px; border-radius: var(--radius-sm); cursor: pointer;
        box-shadow: var(--shadow); transition: background .15s, transform .12s, box-shadow .15s;
      }
      button:hover { background: #f0f0f0; transform: translateY(-1px); box-shadow: var(--shadow-md); }
      button:active { transform: scale(.97); background: #e8e8e8; }

      /* ══ PANTALLA 2 ══ */
      #zipListContainer {
        width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px;
      }

      .zip-item {
        background: var(--surface-2); border: 1px solid var(--border);
        border-radius: var(--radius); overflow: hidden;
        animation: fadeUp .22s ease; transition: border-color .15s;
      }
      .zip-item:hover { border-color: #c8c8c8; }

      .zip-item-bar {
        display: flex; align-items: center; gap: 8px; padding: 10px 12px;
        background: var(--surface); border-bottom: 1px solid var(--border);
        border-left: 3px solid transparent;
        transition: background .12s, border-left-color .2s;
        cursor: pointer; user-select: none;
      }
      .zip-item-bar:hover { background: #fafafa; }

      .zip-item-titulo {
        flex: 1; font-size: 12.5px; font-weight: 600; color: var(--text);
        line-height: 1.3; overflow: hidden; display: -webkit-box;
        -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      }

      .zip-btn-del {
        flex-shrink: 0; background: transparent; border: 1px solid #e8c0c0;
        border-radius: 5px; color: #cc4444; font-size: 11px; padding: 3px 7px;
        cursor: pointer; line-height: 1; box-shadow: none;
        transition: border-color .12s, color .12s;
      }
      .zip-btn-del:hover  { border-color: #cc4444; color: #aa2222; background: transparent; transform: none; box-shadow: none; }
      .zip-btn-del:active { transform: scale(.96); }

      .zip-item-body {
        padding: 11px 14px 10px; display: flex; flex-direction: column; gap: 8px;
      }
      .zip-item-body.collapsed { display: none; }

      .zip-item-fecha {
        font-size: 11px; font-weight: 500; color: var(--text-hint); letter-spacing: .15px;
      }

      .zip-item-texto {
        font-family: 'Arial', sans-serif; font-size: 13px; line-height: 1.75;
        color: var(--text); background: var(--surface); border-radius: var(--radius-sm);
        border: 1px solid var(--border-2); padding: 11px 13px;
      }

      .zip-btn-collapse {
        align-self: center; background: transparent; border: 1px solid var(--border);
        border-radius: 20px; color: var(--text-hint); font-size: 11px;
        padding: 3px 14px; cursor: pointer; box-shadow: none;
        transition: border-color .12s, color .12s; margin-top: 2px;
      }
      .zip-btn-collapse:hover  { border-color: #aaa; color: var(--text-sub); background: transparent; transform: none; box-shadow: none; }
      .zip-btn-collapse:active { transform: scale(.97); }

      .zip-btn-link {
        align-self: flex-start; background: transparent; border: 1px solid #b8d4f0;
        border-radius: 20px; color: #4a7fb0; font-size: 11px; padding: 3px 14px;
        cursor: pointer; box-shadow: none; transition: border-color .12s, color .12s;
      }
      .zip-btn-link:hover  { border-color: #4a7fb0; color: #2d5f8a; background: transparent; transform: none; box-shadow: none; }
      .zip-btn-link:active { transform: scale(.97); }

      .p2-controls {
        display: flex; flex-wrap: wrap; gap: 7px;
        align-items: center; justify-content: center; padding: 0 0 10px 0;
      }

      .p2-search-wrap {
        display: flex; align-items: center; gap: 6px; width: 100%; margin-bottom: 6px;
      }
      .p2-search-input {
        flex: 1; font-family: 'Inter', sans-serif; font-size: 13px; padding: 9px 13px;
        border: 1px solid var(--border); border-radius: var(--radius-sm);
        background: var(--surface); color: var(--text); outline: none;
        transition: border-color .15s, box-shadow .15s; text-align: left; min-width: unset;
      }
      .p2-search-input:focus { border-color: #aaa; box-shadow: 0 0 0 2px rgba(0,0,0,0.06); }
      .p2-search-input::placeholder { color: var(--text-hint); }

      .p2-search-btn { flex-shrink: 0; font-size: 14px; padding: 7px 11px; line-height: 1; }

      .p2-search-clear {
        flex-shrink: 0; background: transparent; border: 1px solid #e8c0c0;
        border-radius: var(--radius-sm); color: #cc4444; font-size: 11px;
        padding: 7px 9px; cursor: pointer; box-shadow: none; display: none;
        line-height: 1; transition: border-color .12s, color .12s;
      }
      .p2-search-clear:hover  { border-color: #cc4444; color: #aa2222; background: transparent; transform: none; box-shadow: none; }
      .p2-search-clear:active { transform: scale(.96); }
      .p2-search-clear.visible { display: block; }

      .p2-search-count {
        font-size: 11px; color: var(--text-hint); text-align: right;
        min-height: 14px; margin-bottom: 8px; padding-right: 2px;
      }

      /* ── REPRODUCTOR TTS ── */
      #tts-player {
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 9000;
        background: var(--surface); border-top: 1px solid var(--border);
        box-shadow: 0 -2px 12px rgba(0,0,0,.1);
        padding: 8px 12px; display: none; flex-direction: column; gap: 6px;
      }
      #tts-player.visible { display: flex; }

      #tts-titulo {
        font-size: 11px; color: var(--text-sub); white-space: nowrap;
        overflow: hidden; text-overflow: ellipsis; font-weight: 500;
      }

      #tts-controles {
        display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      }

      #tts-controles button {
        font-size: 13px; padding: 5px 9px; border-radius: 6px;
        border: 1px solid var(--border); background: var(--surface-2);
        color: var(--text); box-shadow: none; min-width: 34px;
        transition: background .12s;
      }
      #tts-controles button:hover { background: #e8e8e8; transform: none; box-shadow: none; }
      #tts-controles button:active { transform: scale(.95); }
      #tts-controles button:disabled { opacity: .4; pointer-events: none; }

      #tts-btn-play { background: var(--accent) !important; color: #fff !important; border-color: var(--accent) !important; }

      #tts-progreso {
        font-size: 10px; color: var(--text-hint); font-family: monospace;
        white-space: nowrap; flex-shrink: 0;
      }

      #tts-velocidad {
        font-size: 11px; padding: 5px 6px; border: 1px solid var(--border);
        border-radius: 6px; background: var(--surface-2); color: var(--text);
        outline: none; cursor: pointer;
      }

      #tts-voz {
        font-size: 11px; padding: 5px 6px; border: 1px solid var(--border);
        border-radius: 6px; background: var(--surface-2); color: var(--text);
        outline: none; cursor: pointer; max-width: 110px;
      }

      #tts-btn-cerrar {
        margin-left: auto; background: transparent !important;
        border-color: #e8c0c0 !important; color: #cc4444 !important;
        font-size: 11px !important;
      }

      #tts-barra {
        width: 100%; height: 3px; background: var(--border); border-radius: 3px;
        overflow: hidden;
      }
      #tts-barra-inner {
        height: 100%; background: var(--accent); width: 0%;
        transition: width .3s linear;
      }

    </style>
  </head>
  <body>

    <button type="button" class="collapsible" onclick="traslape()">🔁</button>

    <div id="status">Aplicación lista.</div>

    <!-- Pantalla 1 -->
    <div id="pantalla1" class="pantalla">
      <div class="screen-header"><h4>Descargar Transcripciones</h4></div>
      <div class="card">
        <input type="file" id="srtFileInput" accept=".zip" style="display:none" onchange="procesarSrtSeleccionado(this)">
        <div id="listContainer" class="listview"></div>
        <div id="listContainer2" class="listview"></div>
        <div class="controls-row">
          <input type="number" id="rangeStart" placeholder="Ini" min="1">
          <input type="number" id="rangeEnd" placeholder="Fin" min="1">
          <input type="text" id="urlRaiz" placeholder="URL base">
        </div>
        <div class="controls-row">
          <select id="accionSelector" onchange="pantalla1accionSelector(this.value)">
            <option value="">— Acción —</option>
            <option value="generarLista">📜 Generar lista</option>
            <option value="Start">▶ Start</option>
            <option value="subtitulos">🔎 Subtitulos</option>
            <option value="stop">🛑 Stop</option>
            <option value="limpiarDuplicados">♻️ Limpiar existentes</option>
            <option value="limpiarLongger">🗑️ Limpiar historial</option>
            <option value="guardarHistorial">💾 Guardar historial</option>
            <option value="guardarListaJSON">⬇️ Descargar lista</option>
            <option value="guardarZip">🗃️ Guardar ZIP</option>
          </select>
        </div>

        <button class="action-btn" onclick="abrirConfigWorker()">
          <span class="icon">☁️</span> Worker URL
        </button>

      </div>
    </div>

    <!-- Pantalla 2 -->
    <div id="pantalla2" class="pantalla">
      <div class="screen-header">
        <h4>Visor de ZIP</h4>
        <h6 id="zipCountLabel">Sin archivos cargados</h6>
      </div>

      <div class="p2-controls">
        <input type="file" id="zipFileInput" accept=".zip" style="display:none" onchange="procesarZipTrascripciones(this)">
        <button onclick="document.getElementById('zipFileInput').click()">🗃️ Cargar ZIP</button>

        <input type="number" id="zipIndex" placeholder="# item" min="1" style="width:78px;">
        <button onclick="goStarItem()">Ir</button>
      </div>

      <div class="p2-search-wrap">
        <input class="p2-search-input" type="text" id="p2SearchInput"
               placeholder="Buscar por título o contenido…"
               onkeydown="if(event.key==='Enter') ejecutarBusquedaZip()">
        <button class="p2-search-btn" onclick="ejecutarBusquedaZip()" title="Buscar">🔎</button>
        <button class="p2-search-clear" id="p2SearchClear" onclick="limpiarBusquedaZip()" title="Limpiar">✕</button>
      </div>
      <div class="p2-search-count" id="p2SearchCount"></div>
      <div id="zipListContainer"></div>
    </div>



    <!-- REPRODUCTOR TTS -->
    <div id="tts-player">
      <div id="tts-titulo">—</div>
      <div id="tts-barra"><div id="tts-barra-inner"></div></div>
      <div id="tts-controles">
        <button onclick="ttsAnterior()" title="Párrafo anterior">⏮</button>
        <button id="tts-btn-play" onclick="ttsPlayPausa()">▶</button>
        <button onclick="ttsSiguiente()" title="Párrafo siguiente">⏭</button>
        <span id="tts-progreso">0 / 0</span>


        <input type="range" id="tts-velocidad" 
               min="1" max="2" step="0.01" value="1.27"
               oninput="ttsVelocidad(this.value)"
               style="width:80px;cursor:pointer;accent-color:var(--accent);">
        <span id="tts-vel-label" style="font-size:10px;color:var(--text-hint);font-family:monospace;min-width:32px;">1.27×</span>


        <select id="tts-voz" title="Voz">
          <option value="Zephyr">Zephyr ♀</option>
          <option value="Kore">Kore ♀</option>
          <option value="Aoede">Aoede ♀</option>
          <option value="Leda">Leda ♀</option>
          <option value="Puck">Puck ♂</option>
        </select>
        <button id="tts-btn-cerrar" onclick="ttsCerrar()">✕</button>
      </div>
    </div>

    <!-- Pantalla 3 -->
    <div id="pantalla3" class="pantalla">
      <div class="screen-header"><h4>Área de trabajo</h4></div>
      <div class="card">
        <p style="color:var(--text-hint);font-size:13px;text-align:center;padding:24px 0;">
          Espacio reservado para nuevas funciones.
        </p>
      </div>
    </div>  
  </body>
  <script>

    let trabajando = false;
    let zipItems = [];
    let uidCounter = 0;
    const archivosEnMemoria = [];

    let CF_WORKER      = localStorage.getItem('_cf_worker_url');   
    let servercloud    = CF_WORKER + '/raw?target=';
    let serverclouddw  = CF_WORKER + '/download?target=';

    const nombredeHistorial = 'HistorialLink';


    async function webtotext(url) {
      const r = await fetch( servercloud + url);
      return await r.text();
    }


    function abrirConfigWorker() {
      const actual = localStorage.getItem('_cf_worker_url');
      const nueva = prompt('☁️ Cloudflare Worker URL:', actual);
      if (nueva === null) return; // canceló
      if (!nueva.trim()) { actualizarStatus("⚠️ URL vacía, no se guardó."); return; }

      const url = nueva.trim().replace(/\/$/, ''); // quitar / final si tiene
      localStorage.setItem('_cf_worker_url', url);

      // Actualizar variables en memoria
      CF_WORKER      = url;
      servercloud    = url + '/raw?target=';
      serverclouddw  = url + '/download?target=';

      actualizarStatus("✅ Worker URL actualizado: " + url);
    }

    /* ── HTML TEMPLATE ── */
    function recontruirHTMLparazip(tbloque, fecha, etitle) {
      return `<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transcrito</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; background: #a8d8ff; color: #333; }
    header { display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; margin-bottom:30px; border-bottom:2px solid #ddd; padding-bottom:10px; }
    header h1 { font-size:20pt; margin:0; color:#222; flex:1 1 100%; text-align:center; }
    .published { font-size:12pt; color:#666; text-align:center; margin-top:10px; flex:1 1 100%; }
    .published h6 { margin:0; font-size:11pt; font-weight:bold; color:#444; }
    .published span { display:block; margin-top:4px; }
    .transcript { background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,.1); max-width:900px; margin:auto; }
    .transcript p { margin:12px 0; font-size:14pt; text-align:justify; }
    </style>
    </head>
<body>
<header>
  <h1>${etitle}</h1>
  <div class="published"><h6>Publicado</h6><span>${fecha}</span></div>
    </header>

<div class="transcript" role="document">
  <p><span class="speaker"></span>
  ${tbloque}</p>
    </div>

    </body>
    </html>`;
    }

    /* ── SPLIT ── */
    function Split(text, dl1, dl2) {
      const resultados = [];
      let inicio = 0;
      while (true) {
        const posInicio = text.indexOf(dl1, inicio);
        if (posInicio === -1) break;
        const posFin = text.indexOf(dl2, posInicio + dl1.length);
        if (posFin === -1) break;
        resultados.push(text.substring(posInicio + dl1.length, posFin));
        inicio = posFin + dl2.length;
      }
      return resultados;
    }

    function actualizarStatus(m) { document.getElementById("status").innerText = m; }

    function sanitizeFilename(text) {
      let n = text.replace(/\s+/g, "-").replace(/[^a-zA-Z0-9-_]/g, "");
      return n.length === 0 ? "archivo" : n;
    }

    function parseFechaUniversal(texto) {
      const meses = {
        "enero":"01","febrero":"02","marzo":"03","abril":"04","mayo":"05","junio":"06",
        "julio":"07","agosto":"08","septiembre":"09","setiembre":"09","octubre":"10",
        "noviembre":"11","diciembre":"12",
        "jan":"01","january":"01","feb":"02","february":"02","mar":"03","march":"03",
        "apr":"04","april":"04","may":"05","jun":"06","june":"06","jul":"07","july":"07",
        "aug":"08","august":"08","sep":"09","sept":"09","september":"09","oct":"10",
        "october":"10","nov":"11","november":"11","dec":"12","december":"12"
      };
      let limpio = texto.trim().toLowerCase().replace(/,/g, "").replace(/\s+/g, " ");
      const rNum = /^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/.exec(limpio);
      if (rNum) return `${rNum[3]}-${rNum[2].padStart(2,"0")}-${rNum[1].padStart(2,"0")}`;
      const p = limpio.split(" ");
      if (p.length < 3) return "";
      let dia, mes, año;
      if (isNaN(p[0])) { mes = meses[p[0]] || "00"; dia = p[1].padStart(2,"0"); año = p[2]; }
      else              { dia = p[0].padStart(2,"0"); mes = meses[p[1]] || "00"; año = p[2]; }
      return `${año}-${mes}-${dia}`;
    }

    function agregarSaltos(t) {
      return t.replace(/\/><b>/g, "/><b>\n");
    }

    /* ── EXTRACCIÓN (fuente web, pantalla 1) ── */
    function extraerTranscriptBloque(html) {
      const dl1 = '<div class="transcript-content">', dl2 = '</div>', dl3 = '</p>';
      const bloques = Split(html, dl1, dl2);
      if (!bloques.length) return "";
      return Split(bloques[0] + dl1, dl3, dl1)[0] || "";
    }
    function extraerFecha(html) {
      const dl2 = '</div>', dl3 = '</span>';
      let sB = Split(html, '<h6>Published', dl2);
      if (!sB.length) sB = Split(html, '<h6>Publicad', dl2);
      if (!sB.length) return "";
      const r = Split(sB[0], '<span>', dl3);
      return r.length ? r[0].trim() : "";
    }
    function extraerTitulo(html) {
      const sB = Split(html, '<div class="transcript-content">', '</p>');
      if (!sB.length) return "";
      const r = Split(sB[0] + '</p>', '<p class="bold">', '</p>');
      return r.length ? r[0] : "";
    }
    
    //.html en archivos .zip previamente generados 
    function zipextraerTbloque(html) {
      const titulo   = Split(html, '<h1>', '</h1>')[0] || "";
      const fecha    = Split(html, '<span>', '</span>')[0] || "";
      const bloques  = Split(html, '<div class="transcript"', '</div>');
      let contenido  = "";
      if (bloques.length) {
        const inner = bloques[0].replace(/^[^>]*>/, '');
        contenido = inner.replace(/<span class="speaker"><\/span>/gi, '').trim();
      }
      return `<b>${titulo}</b><br><small>${fecha}</small><br><br>${contenido}`;
    }

    /* ── ARCHIVOS ── */
    async function crearZip(nombreReferencia) {
      const zip  = new JSZip();
      const conH = getcontenidoHistorial();
      if (conH && conH.trim()) zip.file(nombredeHistorial + '.html', conH);

      // Guardar mapa nombre→url como JSON
      const mapaLinks = {};
      const urls = conH ? conH.split("\n").map(l => l.trim()).filter(l => l) : [];
      archivosEnMemoria.forEach((a, i) => {
        if (urls[i]) mapaLinks[a.nombre] = urls[i];
      });
      zip.file(nombredeHistorial + '.json', JSON.stringify(mapaLinks, null, 2));

      archivosEnMemoria.forEach(a => zip.file(a.nombre, a.blob));
      const blob = await zip.generateAsync({ type: "blob" });
      const link = document.createElement("a");
      link.href     = URL.createObjectURL(blob);
      link.download = `${nombreReferencia}.zip`;
      link.click();
      actualizarStatus("ZIP creado: " + nombreReferencia);
    }

    function criarArchivo(contenido, NombreDoc) {
      try {
        const blob = new Blob([contenido], { type: "text/html" });
        const e    = document.createElement("a");
        e.href = URL.createObjectURL(blob); e.download = NombreDoc + '.html';
        document.body.appendChild(e); e.click(); document.body.removeChild(e);
        URL.revokeObjectURL(e.href);
      } catch(err) { actualizarStatus("Error archivo " + NombreDoc + ": " + err); }
    }

    // Guarda en memoria y devuelve el uid asignado para poder vincularlo a zipItems
    function guardarFile(contenido, NombreDoc, uid) {
      try {
        archivosEnMemoria.push({
          uid:    uid,
          nombre: NombreDoc + ".html",
          blob:   new Blob([contenido], { type: "text/html" })
        });
        actualizarStatus("Guardado: " + NombreDoc + ".html");
      } catch(err) { actualizarStatus("Error guardar: " + err.message); }
    }

    async function guardardoc(html) {
      try {
        const eTitle = extraerTitulo(html);
        const bloque = agregarSaltos(extraerTranscriptBloque(html));
        const eFecha = extraerFecha(html);
        const nombre = sanitizeFilename(parseFechaUniversal(eFecha) + '-' + eTitle);
        // Sin uid aquí porque viene de descarga web, no del visor ZIP
        guardarFile(recontruirHTMLparazip(bloque, eFecha, eTitle), nombre, null);
        actualizarStatus("Generado: " + nombre);
      } catch(err) { actualizarStatus("Error guardardoc: " + err); }
    }

    async function cargarTranscriptDesdeURL(url) {
      try { const h = await webtotext(url); if (h) await guardardoc(h); }
      catch(err) { actualizarStatus("Error cargar transcript: " + err); }
    }

    /* ── LISTVIEW ── */
    function listViewadd(url, containerId = "listContainer") {
      const c = document.getElementById(containerId);
      if (!c || url.trim() === "") return;
      const item = document.createElement("div");
      item.className = "item"; item.innerText = url;
      item.onclick = () => {
        c.querySelectorAll(".item").forEach(el => el.classList.remove("selected"));
        item.classList.add("selected"); window.open(url, "_blank");
      };
      c.appendChild(item);
    }
    function agregarCelda(url) { return listViewadd(url, "listContainer"); }
    function addLongger(url)   { return listViewadd(url, "listContainer2"); }

    function listViewRemover(url, containerId = "listContainer") {
      const c = document.getElementById(containerId);
      if (!c || url.trim() === "") return;
      const item = Array.from(c.getElementsByClassName("item")).find(el => el.innerText.trim() === url);
      if (item) c.removeChild(item);
    }
    function removerCelda(url) { return listViewRemover(url, "listContainer"); }

    // Elimina del historial (listContainer2) por posición ordinal (0-based)
    function removerHistorialPorIndice(posicion) {
      const c = document.getElementById("listContainer2");
      if (!c) return;
      const items = c.getElementsByClassName("item");
      if (posicion >= 0 && posicion < items.length) {
        c.removeChild(items[posicion]);
      }
    }

    function obtLink(index) {
      const c     = document.getElementById("listContainer");
      const items = c.getElementsByClassName("item");
      const pos   = index - 1;
      if (pos >= 0 && pos < items.length) return items[pos].innerText.trim();
      actualizarStatus("Índice fuera de rango: " + index); return "";
    }

    /* ── URL HELPERS ── */
    function limpiarURL(base, fragmento) {
      let e = fragmento.trim().replace(/[\r\n]/g,"").replace(/\s+/g,"").replace(/["']/g,"");
      if (e.startsWith("http://") || e.startsWith("https://")) return e;
      if (base.endsWith("/transcripts") && e.startsWith("/transcripts"))
        return base + e.replace("/transcripts", "");
      if (!base.endsWith("/") && !e.startsWith("/")) return base + "/" + e;
      return base + e;
    }

    function extraerReferencias(html) {
      const r = []; const rx = /<li class="collection-item"><a href="([^"]+)">/g; let m;
      while ((m = rx.exec(html)) !== null) r.push(m[1].trim());
      return r;
    }

    /* ── ACCIONES ── */
    async function generarLista() {
      try {
        if (trabajando) { actualizarStatus("Proceso en curso"); return; }
        trabajando = true;
        const urlRaiz = document.getElementById("urlRaiz").value.trim();
        if (!urlRaiz) { actualizarStatus("URL raíz vacía."); trabajando = false; return; }
        const html = await webtotext(urlRaiz);
        if (!html) { actualizarStatus("Sin contenido."); trabajando = false; return; }
        const refs = extraerReferencias(html);
        if (!refs.length) { actualizarStatus("Sin enlaces."); trabajando = false; return; }
        document.getElementById("listContainer").innerHTML = "";
        refs.forEach(r => { const u = limpiarURL(urlRaiz, r); if (u) agregarCelda(u); });
        trabajando = false;
        actualizarStatus("Lista generada: " + refs.length + " elementos.");
      } catch(err) { trabajando = false; actualizarStatus("Error generarLista: " + err); }
    }

    async function start() {
      try {
        if (trabajando) { actualizarStatus("Proceso en ejecución!"); return; }
        trabajando = true;
        const items = document.querySelectorAll("#listContainer .item");
        const urls  = Array.from(items).map(i => i.innerText.trim());
        const ini   = parseInt(document.getElementById("rangeStart").value, 10) || 1;
        const fin   = parseInt(document.getElementById("rangeEnd").value,   10) || urls.length;
        const si    = Math.max(ini - 1, 0), ei = Math.min(fin, urls.length);
        actualizarStatus("Procesando " + ini + " al " + fin);
        let count = 0;
        for (let i = si; i < ei; i++) {
          const url = urls[i]; if (!url) continue;
          actualizarStatus("Descargando: " + url);
          await cargarTranscriptDesdeURL(url);
          addLongger(url); removerCelda(url); count++;
          if (!trabajando) {
            actualizarStatus("Detenido. Pendientes: " + document.querySelectorAll("#listContainer .item").length);
            return;
          }
        }
        actualizarStatus("✅ " + count + " archivos listos. Guardar con 🗃️");
        trabajando = false;
      } catch(err) { trabajando = false; actualizarStatus("Error start: " + err); }
    }

    function limpiarDuplicados() {
      const c1 = document.getElementById("listContainer");
      const c2 = document.getElementById("listContainer2");
      if (!c1 || !c2) { actualizarStatus("Contenedores no encontrados."); return; }
      const hist = Array.from(c2.getElementsByClassName("item")).map(i => i.innerText.trim());
      Array.from(c1.getElementsByClassName("item")).forEach(i => {
        if (hist.includes(i.innerText.trim())) c1.removeChild(i);
      });
      actualizarStatus("Duplicados eliminados.");
    }

    function limpiarLongger() {
      const c2 = document.getElementById("listContainer2");
      if (!c2) { actualizarStatus("Historial no encontrado."); return; }
      c2.innerHTML = ""; limpiarHistorialLocalStorage();
      actualizarStatus("Historial limpiado.");

    /* ── NAVEGACIÓN ── */
    let pantallaActual = 0;
    function traslape() {
      ["pantalla1","pantalla2","pantalla3"].forEach(id => document.getElementById(id).style.display = "none");
      pantallaActual++; if (pantallaActual > 3) pantallaActual = 1;

    /* ══════════════════════════════
       PANTALLA 2 — ITEMS
       ══════════════════════════════ */


    function eliminarZipItem(uid) {
      const posicion = zipItems.findIndex(it => it.uid === uid);
      zipItems = zipItems.filter(it => it.uid !== uid);  
      const idxMem = archivosEnMemoria.findIndex(a => a.uid === uid);
      if (idxMem !== -1) archivosEnMemoria.splice(idxMem, 1);

      if (posicion !== -1) removerHistorialPorIndice(posicion);

      const el = document.getElementById("zip-item-" + uid);
      if (el) el.remove();
      document.getElementById("zipCountLabel").innerText =
        zipItems.length ? zipItems.length + " archivos cargados" : "Sin archivos cargados";

      actualizarStatus("Ítem eliminado. Quedan: " + zipItems.length);
    }

    function toggleZipItem(uid) {
      const body = document.getElementById("zip-body-" + uid);
      if (!body) return;
      // Construir el contenido la primera vez antes de mostrarlo
      construirCuerpoSiNecesario(uid);
      body.classList.toggle("collapsed");
      const estaAbierto = !body.classList.contains("collapsed");
      if (estaAbierto) {
        const pos = zipItems.findIndex(it => it.uid === uid);
        if (pos !== -1) {
          document.getElementById("zipIndex").value = pos + 1;
          localStorage.setItem("zipIndexGuardado", pos + 1);
        }
      }
    }

    function colapsarZipItem(uid) {
      const body = document.getElementById("zip-body-" + uid);
      if (body) body.classList.add("collapsed");
    }

    function sanitizarContenido(html) {
      if (!html) return "";

      return html
      // 1. Normalizar <strong> → <b> y <em> → <i>
        .replace(/<strong([^>]*)>/gi, '<b>')
        .replace(/<\/strong>/gi, '</b>')
        .replace(/<em([^>]*)>/gi, '<i>')
        .replace(/<\/em>/gi, '</i>')

      // 2. Convertir <p> y <div> en saltos
        .replace(/<\/p>/gi, '<br>')
        .replace(/<\/div>/gi, '<br>')

      // 4. Eliminar TODAS las demás etiquetas excepto <b>, </b>, <i>, </i>, <br>
        .replace(/<(?!\/?b>|\/?\bi\b>|\/?br\s*\/?>)[^>]+>/gi, '')    
    }

    // Construye el contenido del cuerpo la PRIMERA VEZ que se abre el ítem (lazy).
    // El texto ya está en zipItems[] desde la carga — aquí solo se vuelca al DOM.
    function construirCuerpoSiNecesario(uid) {
      const body = document.getElementById("zip-body-" + uid);
      if (!body || body.dataset.cargado === "1") return;

      const it = zipItems.find(x => x.uid === uid);
      if (!it) return;

      const textoEl = document.createElement("div");
      textoEl.className = "zip-item-texto";
      // sanitizarContenido solo se ejecuta al abrir, nunca durante la carga masiva
      textoEl.innerHTML = sanitizarContenido(it.texto) || "Sin contenido disponible.";
      body.appendChild(textoEl);

      const btnColapsar = document.createElement("button");
      btnColapsar.className = "zip-btn-collapse";
      btnColapsar.textContent = "▲ Contraer";
      btnColapsar.addEventListener("click", (e) => { e.stopPropagation(); colapsarZipItem(uid); });
      body.appendChild(btnColapsar);

      if (it.link) {
        const btnLink = document.createElement("button");
        btnLink.className = "zip-btn-link";
        btnLink.textContent = "🌐";
        btnLink.title = it.link;
        btnLink.addEventListener("click", (e) => {
          e.stopPropagation();
          window.open(it.link, "_blank", "noopener,noreferrer");
        });
        body.appendChild(btnLink);
      }

      body.dataset.cargado = "1";
    }

    // Crea el elemento DOM de un ítem: solo la BARRA (título + botones).
    // El cuerpo (texto largo) se deja vacío y collapsed — se llena al primer toggle.
    // Esto elimina el cuello de botella de sanitizarContenido durante la carga masiva.
    function crearZipItem(uid, titulo, texto) {
      const item = document.createElement("div");
      item.className = "zip-item";
      item.id = "zip-item-" + uid;

      const bar = document.createElement("div");
      bar.className = "zip-item-bar";
      bar.style.borderLeftColor = texto ? "#6abf8a" : "transparent";


      const btnTTS = document.createElement("button");
      btnTTS.className = "zip-btn-del";
      btnTTS.style.cssText = "border-color:#b8d4f0;color:#4a7fb0;";
      btnTTS.textContent = "🔊";
      btnTTS.title = "Escuchar";
      btnTTS.addEventListener("click", (e) => { e.stopPropagation(); ttsIniciar(uid); });
      bar.appendChild(btnTTS);

      const titulo_el = document.createElement("div");
      titulo_el.className = "zip-item-titulo";
      titulo_el.textContent = titulo;
      bar.appendChild(titulo_el);

      const btnDel = document.createElement("button");
      btnDel.className = "zip-btn-del";
      btnDel.textContent = "✕";
      btnDel.title = "Eliminar";
      btnDel.addEventListener("click", (e) => { e.stopPropagation(); eliminarZipItem(uid); });

      bar.appendChild(btnDel);

      bar.addEventListener("click", () => toggleZipItem(uid));
      item.appendChild(bar);

      // Cuerpo vacío — se llena la primera vez que el usuario lo abre
      const body = document.createElement("div");
      body.className = "zip-item-body collapsed";
      body.id = "zip-body-" + uid;
      body.dataset.cargado = "0";
      item.appendChild(body);

      return item;
    }

    // Renderiza toda la lista en lotes para no congelar la UI.
    // Solo crea la barra de cada ítem — el cuerpo se construye al abrir (lazy).
    async function renderZipList() {
      const container = document.getElementById("zipListContainer");
      container.innerHTML = "";

      const LOTE = 200;
      for (let i = 0; i < zipItems.length; i++) {
        const it = zipItems[i];
        // Solo uid, titulo y si tiene texto (para el color de la barra)
        container.appendChild(crearZipItem(it.uid, it.titulo, it.texto));
        if (i % LOTE === LOTE - 1) {
          actualizarStatus('Cargando... ' + (i + 1) + '/' + zipItems.length);
          await new Promise(r => setTimeout(r, 0));
        }
      }

      document.getElementById("zipCountLabel").innerText =
        zipItems.length ? zipItems.length + " archivos cargados" : "Sin archivos cargados";
    }

    /* ── BÚSQUEDA ── */
    function ejecutarBusquedaZip() {
      const t        = document.getElementById("p2SearchInput").value.trim().toLowerCase();
      const clearBtn = document.getElementById("p2SearchClear");
      const countEl  = document.getElementById("p2SearchCount");

      if (clearBtn) clearBtn.classList.toggle("visible", t.length > 0);

      if (!t) {
        zipItems.forEach(it => {
          const el   = document.getElementById("zip-item-" + it.uid);
          const body = document.getElementById("zip-body-"  + it.uid);
          if (el)   el.style.display = "";
          if (body) body.classList.add("collapsed");
        });
        if (countEl) countEl.textContent = "";
        return;
      }

      let visibles = 0;
      zipItems.forEach(data => {
        const el   = document.getElementById("zip-item-" + data.uid);
        const body = document.getElementById("zip-body-"  + data.uid);
        if (!el) return;

        const haystack = (
          (data.titulo || "") + " " +
          (data.texto  || "").replace(/<[^>]+>/g, " ")
        ).toLowerCase();

        const match = haystack.includes(t);
        el.style.display = match ? "" : "none";
        if (match) {
          visibles++;
          if (body) body.classList.add("collapsed");
        }
      });

      if (countEl) {
        countEl.textContent =
          visibles + " resultado" + (visibles !== 1 ? "s" : "") + " de " + zipItems.length;
      }
    }

    function limpiarBusquedaZip() {
      const input = document.getElementById("p2SearchInput");
      if (input) { input.value = ""; input.focus(); }
      const clearBtn = document.getElementById("p2SearchClear");
      if (clearBtn) clearBtn.classList.remove("visible");
      const countEl = document.getElementById("p2SearchCount");
      if (countEl) countEl.textContent = "";
      zipItems.forEach(it => {
        const el   = document.getElementById("zip-item-" + it.uid);
        const body = document.getElementById("zip-body-"  + it.uid);
        if (el)   el.style.display = "";
        if (body) body.classList.add("collapsed");
      });
    }

    /* ── CARGAR ZIP ── */
    function cargarHistorialdesdeZip(htmlContenido) {
      try {
        const c2 = document.getElementById("listContainer2");
        c2.innerHTML = "";
        htmlContenido.split("\n").forEach(url => {
          if (url.trim()) listViewadd(url.trim(), "listContainer2");
        });
        actualizarStatus("Historial cargado desde ZIP.");
      } catch(err) { actualizarStatus("Error historial ZIP: " + err.message); }
    }

    async function procesarZipTrascripciones(input) {
      try {
        const file = input.files[0];
        if (!file) return;
        input.value = "";

        if (trabajando) { actualizarStatus("Proceso en ejecución!"); return; }

        trabajando=true;

        const zip       = await JSZip.loadAsync(file);
        zipItems        = [];
        uidCounter      = 0;
        archivosEnMemoria.length = 0;

        const todosArchivos = Object.keys(zip.files);
        const filenames = todosArchivos.filter(f => f.endsWith(".html") && !f.includes(nombredeHistorial));

        // Cargar historial HTML (para listContainer2)
        const histHtml = todosArchivos.find(f => f.endsWith(".html") && f.includes(nombredeHistorial));
        if (histHtml) {
          const cont = await zip.files[histHtml].async("string");
          cargarHistorialdesdeZip(cont);
        }

        // Cargar mapa JSON nombre→url
        let mapaLinks = {};
        const histJson = todosArchivos.find(f => f.includes(nombredeHistorial) && f.endsWith(".json"));
        if (histJson) {
          const jsonStr = await zip.files[histJson].async("string");
          try { mapaLinks = JSON.parse(jsonStr); } catch(e) { mapaLinks = {}; }
        }

        actualizarStatus('Descomprimiendo... ' + filenames.length + ' archivos');

        for (let i = 0; i < filenames.length; i++) {
          const filename  = filenames[i];
          const contenido = await zip.files[filename].async("string");
          const uid       = uidCounter++;
          const titulo    = filename.split('/').pop();
          const texto     = zipextraerTbloque(contenido);
          const link      = mapaLinks[filename] || "";

          archivosEnMemoria.push({
            uid:    uid,
            nombre: filename,
            blob:   new Blob([contenido], { type: "text/html" })
          });

          zipItems.push({ uid, titulo, texto, link });
        }

        actualizarStatus('Renderizar Items...');

        await renderZipList();
        limpiarBusquedaZip();
        trabajando = false;
        actualizarStatus("ZIP cargado: " + filenames.length + " archivos HTML.");
      } catch(err) {
        trabajando = false;
        actualizarStatus("Error cargar ZIP: " + err.message);
      }
    }

    async function goStarItem() {
      try {
        const pos = parseInt(document.getElementById("zipIndex").value, 10);
        if (isNaN(pos) || pos < 1 || pos > zipItems.length) {
          actualizarStatus("Índice inválido. Rango: 1–" + zipItems.length); return;
        }
        const it   = zipItems[pos - 1];
        const item = document.getElementById("zip-item-" + it.uid);
        if (!item) { actualizarStatus("Item no encontrado."); return; }
        // Construir contenido antes de mostrar
        construirCuerpoSiNecesario(it.uid);
        item.scrollIntoView({ behavior: "smooth", block: "center" });
        const body = document.getElementById("zip-body-" + it.uid);
        if (body) body.classList.remove("collapsed");
        actualizarStatus("Item seleccionado: " + pos);
      } catch(err) { actualizarStatus("Error goStarItem: " + err.message); }
    }

    /* ── SUBTÍTULOS ── */
    function limpiarSubtitulos(srtTexto) {
      return srtTexto.split("\n").filter(l => {
        const t = l.trim();
        return t !== "" && !/^\d+$/.test(t) && !/^\d{2}:\d{2}:\d{2},\d{3}/.test(t);
      }).join(", ");
    }

    function subtitulosextraerFecha(nombreArchivo) {
      const s     = nombreArchivo.substring(0, 8);
      const fecha = new Date(`${s.substring(0,4)}-${s.substring(4,6)}-${s.substring(6,8)}`);
      return fecha.toLocaleDateString("es-ES", { day: "2-digit", month: "long", year: "numeric" });
    }

    async function RenderizarSubTitulo(contenido, nombreArchivo) {
      try {
        const subFlix = limpiarSubtitulos(contenido) + ' </p>';
        const fechaEs = subtitulosextraerFecha(nombreArchivo);
        const nombreT = nombreArchivo.substring(9).trim();
        guardarFile(recontruirHTMLparazip(subFlix, fechaEs, nombreT), nombreArchivo, null);
        actualizarStatus("Sub renderizado: " + nombreArchivo);
      } catch(err) { actualizarStatus("Error RenderizarSubTitulo: " + err.message); }
    }

    async function procesarSrtSeleccionado(input) {
      try {
        const file = input.files[0];
        if (!file) return;
        input.value = "";

        if (trabajando) { actualizarStatus("Proceso en ejecución!"); return; }
        trabajando = true;

        const zip = await JSZip.loadAsync(file);
        let contador = 0;

        for (const filename of Object.keys(zip.files)) {
          const entry = zip.files[filename];
          if (filename.endsWith(".srt") || filename.endsWith(".vtt")) {
            await RenderizarSubTitulo(await entry.async("string"), filename);
            contador++;
            actualizarStatus("Sub-" + filename);
            if (!trabajando) return;
          }
        }

        actualizarStatus("✅ Sub finalizados: " + contador + " archivos. Guardar con 🗃️");
        trabajando = false;
      } catch(err) {
        trabajando = false;
        actualizarStatus("Error extraerSubTitulos: " + err.message);
      }
    }



    /* ══════════════════════════════
   TTS — TEXT TO SPEECH
══════════════════════════════ */
    const TTS = {
      parrafos:    [],   // array de strings
      indice:      0,    // párrafo actual
      audioActual: null, // AudioBuffer o Audio element
      jugando:     false,
      velocidad:   1.27,
      voz:         'Zephyr',
      cache:       {},   // indice → blob URL ya generado
      prefetchando:false,
      titulo:      '',
    };

    function ttsSepararParrafos(texto) {
      // Quitar etiquetas HTML y dividir en párrafos no vacíos
      const limpio = texto.replace(/<[^>]+>/g, ' ')
      .replace(/\s+/g, ' ').trim();
      // Dividir por punto seguido de espacio o salto — mínimo 60 chars por párrafo
      const partes = limpio.split(/(?<=[.!?])\s+(?=[A-ZÁÉÍÓÚÑ])/);
      const resultado = [];
      let acumulado = '';
      for (const p of partes) {
        acumulado += (acumulado ? ' ' : '') + p;
        if (acumulado.length >= 200) {
          resultado.push(acumulado.trim());
          acumulado = '';
        }
      }
      if (acumulado.trim()) resultado.push(acumulado.trim());
      return resultado.filter(p => p.length > 10);
    }

    async function ttsFetchAudio(texto, indice) {
      if (TTS.cache[indice]) return TTS.cache[indice]; // ya cacheado
      // Dividir en chunks de 180 chars respetando palabras
      const chunks = [];
      let resto = texto.trim();
      while (resto.length > 0) {
        if (resto.length <= 180) { chunks.push(resto); break; }
        let corte = resto.lastIndexOf(' ', 180);
        if (corte < 100) corte = 180;
        chunks.push(resto.slice(0, corte).trim());
        resto = resto.slice(corte).trim();
      }

      // Fetch de todos los chunks
      const blobs = await Promise.all(chunks.map(async chunk => {
        const resp = await fetch(`${CF_WORKER}/gtts?q=${encodeURIComponent(chunk)}`);
        if (!resp.ok) throw new Error('Google TTS error: ' + resp.status);
        return await resp.arrayBuffer();
      }));

      // Concatenar buffers
      const totalLen = blobs.reduce((s, b) => s + b.byteLength, 0);
      const combined = new Uint8Array(totalLen);
      let offset = 0;
      for (const b of blobs) {
        combined.set(new Uint8Array(b), offset);
        offset += b.byteLength;
      }

      const blob = new Blob([combined], { type: 'audio/mpeg' });
      const url  = URL.createObjectURL(blob);
      TTS.cache[indice] = url;
      return url;
    }

    async function ttsReproducir(indice) {
      if (indice < 0 || indice >= TTS.parrafos.length) {
        ttsCerrar(); return;
      }
      TTS.indice = indice;
      ttsActualizarUI();

      if (TTS.audioActual) {
        TTS.audioActual.pause();
        TTS.audioActual.src = '';
        TTS.audioActual = null;
      }

      actualizarStatus('🔊 Generando audio párrafo ' + (indice + 1) + '...');

      try {
        const url  = await ttsFetchAudio(TTS.parrafos[indice], indice);
        actualizarStatus('✅ Audio obtenido, reproduciendo...');
        const audio = new Audio(url);
        audio.playbackRate = TTS.velocidad;
        TTS.audioActual = audio;
        TTS.jugando = true;
        document.getElementById('tts-btn-play').textContent = '⏸';

        const playPromise = audio.play();
        if (playPromise !== undefined) {
          playPromise
            .then(() => actualizarStatus('🔊 Reproduciendo párrafo ' + (indice+1) + ' de ' + TTS.parrafos.length))
            .catch(e => actualizarStatus('❌ Play error: ' + e.message));
        }

        const siguiente = indice + 1;
        if (siguiente < TTS.parrafos.length && !TTS.cache[siguiente]) {
          setTimeout(() => ttsFetchAudio(TTS.parrafos[siguiente], siguiente), 500);
        }

        audio.onended = () => { if (TTS.jugando) ttsReproducir(TTS.indice + 1); };
        audio.ontimeupdate = () => {
          if (!audio.duration) return;
          const pct = (audio.currentTime / audio.duration) * 100;
          document.getElementById('tts-barra-inner').style.width = pct + '%';
        };

      } catch(e) {
        actualizarStatus('❌ Error TTS: ' + e.message);
        TTS.jugando = false;
        document.getElementById('tts-btn-play').textContent = '▶';
      }
    }

    function ttsPlayPausa() {
      if (!TTS.audioActual) {
        ttsReproducir(TTS.indice);
        return;
      }
      if (TTS.jugando) {
        TTS.audioActual.pause();
        TTS.jugando = false;
        document.getElementById('tts-btn-play').textContent = '▶';
      } else {
        TTS.audioActual.play();
        TTS.jugando = true;
        document.getElementById('tts-btn-play').textContent = '⏸';
      }
    }

    function ttsAnterior() {
      ttsReproducir(Math.max(0, TTS.indice - 1));
    }

    function ttsSiguiente() {
      ttsReproducir(Math.min(TTS.parrafos.length - 1, TTS.indice + 1));
    }

    function ttsVelocidad(v) {
      TTS.velocidad = parseFloat(v);
      if (TTS.audioActual) TTS.audioActual.playbackRate = TTS.velocidad;
      const lbl = document.getElementById('tts-vel-label');
      if (lbl) lbl.textContent = parseFloat(v).toFixed(2) + '×';
    }

    function ttsActualizarUI() {
      document.getElementById('tts-progreso').textContent =
        (TTS.indice + 1) + ' / ' + TTS.parrafos.length;
      document.getElementById('tts-titulo').textContent =
        '🔊 ' + TTS.titulo + ' — párrafo ' + (TTS.indice + 1);
      document.getElementById('tts-barra-inner').style.width = '0%';
    }

    function ttsCerrar() {
      if (TTS.audioActual) {
        TTS.audioActual.pause();
        TTS.audioActual = null;
      }
      TTS.jugando = false;
      TTS.parrafos = [];
      TTS.cache    = {};
      TTS.indice   = 0;
      document.getElementById('tts-player').classList.remove('visible');
      document.getElementById('tts-btn-play').textContent = '▶';
      actualizarStatus('🔊 Reproductor cerrado.');
    }

    function ttsIniciar(uid) {
      const it = zipItems.find(x => x.uid === uid);
      if (!it) return;

      // Limpiar cache anterior
      ttsCerrar();

      TTS.titulo   = it.titulo;
      TTS.voz      = document.getElementById('tts-voz')?.value || 'Zephyr';
      TTS.parrafos = ttsSepararParrafos(it.texto);

      if (!TTS.parrafos.length) {
        actualizarStatus('⚠️ Sin texto para reproducir.');
        return;
      }
      document.getElementById('tts-player').classList.add('visible');
      const sliderVel = document.getElementById('tts-velocidad');
      if (sliderVel) TTS.velocidad = parseFloat(sliderVel.value);
      fetch(`${CF_WORKER}/gtts-init`).finally(() => ttsReproducir(0));
    }


    /* ── INIT ── */
    document.addEventListener("DOMContentLoaded", () => {
      traslape();
      document.getElementById("listContainer").innerHTML = "";
      agregarCelda("https://swaruu.org/transcripts/mensaje-extraterrestre-de-taygeta-pleyades-quienes-somos-1");
      document.getElementById("urlRaiz").value = "https://swaruu.org/es/transcripts";
      cargarHistorial();

      const zipIndexGuardado = localStorage.getItem("zipIndexGuardado");
      if (zipIndexGuardado) {
        document.getElementById("zipIndex").value = zipIndexGuardado;
      }

      actualizarStatus("Aplicación lista. Se cargó un enlace inicial.");
    });

  </script>
